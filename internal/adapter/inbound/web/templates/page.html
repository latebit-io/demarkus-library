{{define "page"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — demarkus Library</title>
  <script src="/static/htmx.min.js"></script>
  <!-- Islands loader (ADR 0003 concessions: mermaid + KaTeX). Tiny; the
       heavy vendored libs load lazily, only on pages that need them. -->
  <script src="/static/islands.js" defer></script>
  <link rel="stylesheet" href="/static/chroma.css">
  <style>
    :root { color-scheme: light dark; }
    body { max-width: 48rem; margin: 0 auto; padding: 1.5rem 1.25rem;
           font: 16px/1.6 system-ui, sans-serif; }
    nav { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem;
          padding-bottom: .75rem; border-bottom: 1px solid #8884; }
    nav a.brand { font-weight: 600; text-decoration: none; white-space: nowrap; }
    nav form[role=search] { flex: 1; margin: 0; }
    nav input[type=search] { width: 100%; padding: .4rem .6rem; border: 1px solid #8886;
          border-radius: 6px; background: transparent; color: inherit; font: inherit; }
    nav form:not([role=search]) { margin: 0; }
    button.signout { font: inherit; font-size: .85rem; padding: .35rem .7rem;
          border: 1px solid #8886; border-radius: 6px; background: transparent;
          color: inherit; cursor: pointer; white-space: nowrap; }
    button.signout:hover { background: #8881; }
    header.doc .meta { font-size: .8rem; opacity: .65; }
    header.doc .meta a { color: inherit; }
    pre { background: #8881; padding: .75rem; overflow-x: auto; border-radius: 6px; }
    code { font-family: ui-monospace, monospace; }
    /* GFM alerts (markdown adapter emits .callout structure; colors are
       GitHub's palette via light-dark(), tracking color-scheme above). */
    .callout { border-left: 3px solid #8886; padding: .1rem 1rem; margin: 1rem 0; }
    .callout-title { display: flex; gap: .5rem; align-items: center; font-weight: 600; }
    .callout-title p { margin: .5rem 0; }
    .callout-body > :first-child { margin-top: .25rem; }
    .callout-note      { border-color: light-dark(#0969da, #4493f8); }
    .callout-note      .callout-title { color: light-dark(#0969da, #4493f8); }
    .callout-tip       { border-color: light-dark(#1a7f37, #3fb950); }
    .callout-tip       .callout-title { color: light-dark(#1a7f37, #3fb950); }
    .callout-important { border-color: light-dark(#8250df, #ab7df8); }
    .callout-important .callout-title { color: light-dark(#8250df, #ab7df8); }
    .callout-warning   { border-color: light-dark(#9a6700, #d29922); }
    .callout-warning   .callout-title { color: light-dark(#9a6700, #d29922); }
    .callout-caution   { border-color: light-dark(#cf222e, #f85149); }
    .callout-caution   .callout-title { color: light-dark(#cf222e, #f85149); }
    table { border-collapse: collapse; }
    th, td { text-align: left; padding: .3rem .6rem; border-bottom: 1px solid #8883; }
    a { text-underline-offset: 2px; }
    .htmx-request#main { opacity: .55; transition: opacity .15s; }
  </style>
</head>
<!-- hx-boost: in-app navigation swaps without a full reload; the server still
     renders every page, so links work with JS off too. -->
<body hx-boost="true">
  <nav>
    <a class="brand" href="/">demarkus Library</a>
    <!-- The form makes the catalog work without JS: Enter submits GET /search?q=…
         and the server renders the full page. htmx enhances it with live,
         debounced, in-place results (ADR 0003: degrade without JS). -->
    <form action="/w/{{ .WorldPath }}/search" method="get" role="search">
      <input type="search" name="q" value="{{ .Query }}" placeholder="search {{ .World }}…"
             aria-label="Search the catalog" autocomplete="off"
             hx-get="/w/{{ .WorldPath }}/search" hx-trigger="input changed delay:300ms, search"
             hx-target="#main" hx-push-url="true">
    </form>
    {{- if .Authenticated }}
    <!-- Real form, POST: logout is a state change and works without JS.
         hx-boost off so the redirect to /login is a full page load. -->
    <form method="post" action="/logout" hx-boost="false">
      <button type="submit" class="signout">sign out</button>
    </form>
    {{- end }}
  </nav>
  <main id="main">
    {{ template "content" . }}
  </main>
</body>
</html>{{end}}
