{{define "edit"}}<!doctype html>
<html lang="en">
{{template "head" .}}
<body hx-boost="true">
  {{template "nav" .}}
  <main id="main">
    <div class="edit-pane">
      <header class="doc">
        <div class="meta"><code>mark://{{ .World }}{{ .Path }}</code> · edition {{ .Version }}</div>
        <h1>Edit {{ .Path }}</h1>
      </header>

      {{- if .Error }}
      <p class="edit-error" role="alert">{{ .Error }}</p>
      {{- end }}

      <!-- Real POST (hx-boost off): save redirects back to the document.
           Metadata rides dedicated fields → the mark_publish metadata object,
           never a body frontmatter fence (ADR 0005 decision 11). -->
      <form class="edit-form" method="post"
            action="/w/{{ .WorldPath }}/edit{{ .Path }}" hx-boost="false">
        <input type="hidden" name="version" value="{{ .Version }}">

        <div class="edit-meta">
          <label>title
            <input type="text" name="title" value="{{ .DocTitle }}"
                   placeholder="document title">
          </label>
          <label>tags
            <input type="text" name="tags" value="{{ .Tags }}"
                   placeholder="comma, separated, tags">
          </label>
          <label>status
            <select name="status">
              {{- range .Statuses }}
              <option value="{{ . }}"{{ if eq . $.Status }} selected{{ end }}>{{ if . }}{{ . }}{{ else }}(none){{ end }}</option>
              {{- end }}
            </select>
          </label>
          <label>importance
            <input type="text" name="importance" value="{{ .Importance }}"
                   inputmode="decimal" placeholder="0–1">
          </label>
        </div>

        <div class="edit-split">
          <!-- Editor: textarea posts to the server-rendered preview as you type
               (htmx-pure, no JS editor; ADR 0003). -->
          <textarea class="edit-body" name="body" rows="28" spellcheck="true"
                    hx-post="/w/{{ .WorldPath }}/preview"
                    hx-trigger="load, keyup changed delay:400ms"
                    hx-target="#edit-preview" hx-swap="innerHTML">{{ .Body }}</textarea>
          <!-- Preview: the same renderer the reader sees. -->
          <article id="edit-preview" class="edit-preview doc-body"></article>
        </div>

        <div class="edit-actions">
          <button type="submit" class="edit-save">save</button>
          <a class="edit-cancel" href="/w/{{ .WorldPath }}/d{{ .Path }}"
             hx-boost="false">cancel</a>
        </div>
      </form>
    </div>
  </main>
</body>
</html>{{end}}
