suite: secret
templates:
  - secret.yaml
release:
  namespace: library-ns
set:
  library.broker.url: https://broker.example.com
  library.broker.clientID: library-web
  library.broker.clientSecret: shh
  library.broker.redirectURI: https://library.example.com/auth/callback
  library.broker.world: root
tests:
  - it: cleartext mode renders an Opaque Secret holding the client secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-demarkus-library-oauth
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData.clientSecret
          value: shh

  - it: existingSecretRef mode renders no chart-managed Secret
    set:
      library.broker.clientSecret: ""
      library.broker.existingSecretRef.name: library-oauth-external
    asserts:
      - hasDocuments:
          count: 0

  - it: quic transport renders no Secret
    set:
      library.transport: quic
      library.broker.clientSecret: ""
      library.quic.host: soul.demarkus.io
    asserts:
      - hasDocuments:
          count: 0
