{{- /* Chart-managed Secret for the OAuth client secret — cleartext-via-
       values mode only. In existingSecretRef mode the operator owns the
       Secret and the chart renders nothing here; the deployment's
       secretKeyRef points at the external name instead. Mutual
       exclusion between the two modes is enforced by
       demarkus-library.validate (called from deployment.yaml). */ -}}
{{- if include "demarkus-library.cleartextSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "demarkus-library.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "demarkus-library.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientSecret: {{ .Values.library.broker.clientSecret | quote }}
{{- end }}
